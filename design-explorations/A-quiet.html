<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ichimoku — デザイン案A 静寂 (Quiet / Linear風)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      /* =========================================================
         案A「静寂」— 引き算の美学。罫線を捨て、余白とタイポで構造化。
         モノトーン基調 + 単一アクセント（深緑）。状態は線でなく濃淡で示す。
         ========================================================= */
      :root {
        --page: #fbfbfa;
        --surface: #ffffff;
        --sunk: #f4f5f4;
        --ink: #18211f;
        --ink2: #5a635f;
        --ink3: #9aa19d;
        --hair: #ececea;
        --accent: #1f6b58;
        --accent-soft: #e9f1ee;
        --crit: #b4451f;
        --warn: #9a6a16;
        --r: 14px;
        --r2: 9px;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        font-family: "Inter", "Noto Sans JP", sans-serif;
        background: var(--page);
        color: var(--ink);
        font-size: 14px;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }
      .mono {
        font-family: "Roboto Mono", monospace;
        font-variant-numeric: tabular-nums;
      }
      .app {
        position: relative;
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        max-width: 1320px;
        margin: 0 auto;
      }
      .scroll {
        flex: 1;
        overflow: auto;
        padding: 4px 34px 48px;
      }

      /* topbar — 罫線なし。余白だけで分離 */
      .topbar {
        display: flex;
        align-items: center;
        gap: 18px;
        padding: 26px 34px 18px;
      }
      .brand {
        display: flex;
        align-items: baseline;
        gap: 12px;
      }
      .brand h1 {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.01em;
        margin: 0;
      }
      .brand .tag {
        font-size: 12px;
        color: var(--ink3);
        letter-spacing: 0.02em;
      }
      .top-actions {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .ghost {
        font: inherit;
        font-size: 13px;
        border: none;
        background: none;
        color: var(--ink2);
        border-radius: var(--r2);
        padding: 8px 12px;
        cursor: pointer;
        min-height: 36px;
      }
      .ghost:hover {
        background: var(--sunk);
        color: var(--ink);
      }
      .who {
        font-size: 12px;
        color: var(--ink3);
        padding: 0 6px;
      }

      /* deadline rail — 箱を捨て、ドット + テキストの流れ */
      .rail {
        margin-bottom: 30px;
      }
      .rail-h {
        display: flex;
        align-items: baseline;
        gap: 10px;
        margin: 0 0 12px;
      }
      .rail-h .l {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--ink3);
      }
      .rail-h .h {
        font-size: 12px;
        color: var(--ink3);
      }
      .rail-row {
        display: flex;
        gap: 26px;
        overflow-x: auto;
        padding-bottom: 4px;
      }
      .dchip {
        flex: 0 0 auto;
        display: flex;
        flex-direction: column;
        gap: 3px;
        cursor: pointer;
        padding: 2px 0;
        min-width: 150px;
      }
      .dchip .t {
        font-size: 14px;
        font-weight: 500;
        color: var(--ink);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .dchip .t::before {
        content: "";
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--ink3);
        flex: 0 0 auto;
      }
      .dchip.crit .t::before {
        background: var(--crit);
      }
      .dchip.warn .t::before {
        background: var(--warn);
      }
      .dchip .m {
        display: flex;
        gap: 10px;
        padding-left: 15px;
      }
      .dchip .dt {
        font-size: 12px;
        color: var(--ink3);
      }
      .dchip .lf {
        font-size: 12px;
        color: var(--ink2);
      }
      .dchip.crit .lf {
        color: var(--crit);
      }
      .dchip.warn .lf {
        color: var(--warn);
      }
      .dchip:hover .t {
        color: var(--accent);
      }
      .rail-empty {
        font-size: 13px;
        color: var(--ink3);
      }

      /* workspace */
      .ws {
        display: grid;
        grid-template-columns: 1.7fr 1fr;
        gap: 40px;
        align-items: start;
      }
      .panel {
        background: transparent;
      }
      .ph {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 18px;
      }
      .ph .tt {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      .ph .sub {
        font-size: 12px;
        color: var(--ink3);
      }
      .ph .right {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      /* quick add — 下線だけ */
      .quick {
        display: flex;
        align-items: center;
        gap: 8px;
        border-bottom: 1.5px solid var(--hair);
        transition: border-color 0.15s;
        min-width: 220px;
      }
      .quick:focus-within {
        border-color: var(--accent);
      }
      .quick input {
        border: none;
        outline: none;
        background: transparent;
        flex: 1;
        font: inherit;
        font-size: 13px;
        padding: 6px 2px;
      }
      .quick .hint {
        font-size: 11px;
        color: var(--ink3);
        white-space: nowrap;
      }
      .mini {
        font: inherit;
        font-size: 13px;
        border: none;
        background: var(--accent-soft);
        color: var(--accent);
        border-radius: var(--r2);
        padding: 7px 13px;
        cursor: pointer;
        min-height: 34px;
        font-weight: 500;
      }
      .mini:hover {
        background: #dceae5;
      }

      /* board — カテゴリは行、状態は列。罫線なし、ヘッダの濃淡だけ */
      .shead {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        padding: 0 0 10px;
        margin-bottom: 4px;
      }
      .shead span {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--ink3);
      }
      .shead .d {
        color: #c4c9c5;
      }
      .lane {
        padding: 14px 0;
      }
      .lane + .lane {
        border-top: 1px solid var(--hair);
      }
      .lane-h {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 2px 0 12px;
        cursor: pointer;
        user-select: none;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }
      .lane-h .nm {
        font-size: 13px;
        font-weight: 600;
      }
      .lane-h .ct {
        font-size: 11px;
        color: var(--ink3);
      }
      .lane-h .cv {
        margin-left: auto;
        color: var(--ink3);
        font-size: 11px;
        transition: transform 0.15s;
      }
      .lane.col .cv {
        transform: rotate(-90deg);
      }
      .lane.col .cells {
        display: none;
      }
      .cells {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }
      .cell {
        min-height: 28px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      /* タスクは「カード」でなく行。hoverで初めて面が出る */
      .card {
        background: transparent;
        border: none;
        border-radius: var(--r2);
        padding: 8px 10px;
        display: flex;
        flex-direction: column;
        gap: 5px;
        cursor: pointer;
        transition:
          background 0.12s,
          box-shadow 0.12s;
        position: relative;
      }
      .card:hover {
        background: var(--surface);
        box-shadow:
          0 1px 2px rgba(0, 0, 0, 0.04),
          0 0 0 1px var(--hair);
      }
      .card .ct {
        font-size: 13px;
        line-height: 1.45;
      }
      .card .meta {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .due {
        font-size: 11px;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        color: var(--ink2);
      }
      .due::before {
        content: "";
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--ink3);
      }
      .due.crit {
        color: var(--crit);
      }
      .due.crit::before {
        background: var(--crit);
      }
      .due.warn {
        color: var(--warn);
      }
      .due.warn::before {
        background: var(--warn);
      }
      .donecard .ct {
        text-decoration: line-through;
        color: var(--ink3);
      }
      .donecard {
        opacity: 0.7;
      }
      .cell-empty {
        font-size: 11px;
        color: #cdd2ce;
        padding: 6px 10px;
      }

      /* calendar — アジェンダ。日付は大きく、予定は静かな行 */
      .agenda {
        display: flex;
        flex-direction: column;
      }
      .day {
        display: grid;
        grid-template-columns: 46px 1fr;
        gap: 16px;
        padding: 14px 0;
      }
      .day + .day {
        border-top: 1px solid var(--hair);
      }
      .dnum {
        font-size: 22px;
        font-weight: 600;
        line-height: 1;
        letter-spacing: -0.02em;
      }
      .dwk {
        font-size: 11px;
        color: var(--ink3);
        margin-top: 4px;
      }
      .day.today .dnum {
        color: var(--accent);
      }
      .day.today .dwk {
        color: var(--accent);
      }
      .evs {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding-top: 2px;
      }
      .ev {
        display: flex;
        gap: 12px;
        align-items: baseline;
        cursor: pointer;
        border-radius: 6px;
        padding: 2px 4px;
        margin: 0 -4px;
      }
      .ev:hover {
        background: var(--sunk);
      }
      .ev .tm {
        font-size: 12px;
        color: var(--ink2);
        min-width: 42px;
      }
      .ev .tl {
        font-size: 13px;
      }
      .ev.acc .tl {
        font-weight: 500;
      }
      .empty {
        font-size: 12px;
        color: var(--ink3);
      }

      /* overlays */
      .backdrop {
        position: absolute;
        inset: 0;
        background: rgba(20, 30, 28, 0.1);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.18s;
        z-index: 20;
        backdrop-filter: blur(1px);
      }
      .backdrop.on {
        opacity: 1;
        pointer-events: auto;
      }
      .peek {
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        width: 400px;
        background: var(--surface);
        box-shadow: -20px 0 50px rgba(20, 30, 28, 0.1);
        transform: translateX(100%);
        transition: transform 0.24s cubic-bezier(0.32, 0.72, 0, 1);
        z-index: 30;
        display: flex;
        flex-direction: column;
      }
      .peek.on {
        transform: translateX(0);
      }
      .peek-in {
        padding: 26px 26px 30px;
        display: flex;
        flex-direction: column;
        gap: 18px;
        overflow: auto;
      }
      .peek-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .peek-top .lab {
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--ink3);
      }
      .peek-top .saved {
        font-size: 11px;
        color: var(--accent);
        opacity: 0;
        transition: opacity 0.2s;
        margin-left: auto;
        margin-right: 10px;
      }
      .peek-top .saved.show {
        opacity: 1;
      }
      .x {
        cursor: pointer;
        color: var(--ink3);
        font-size: 20px;
        line-height: 1;
        border: none;
        background: none;
        width: 32px;
        height: 32px;
        border-radius: 8px;
      }
      .x:hover {
        background: var(--sunk);
        color: var(--ink);
      }
      .f-title {
        font-size: 19px;
        font-weight: 600;
        border: none;
        border-bottom: 1.5px solid var(--hair);
        border-radius: 0;
        padding: 6px 0;
        outline: none;
        font-family: inherit;
        letter-spacing: -0.01em;
      }
      .f-title:focus {
        border-color: var(--accent);
      }
      .fld label {
        font-size: 11px;
        color: var(--ink3);
        letter-spacing: 0.04em;
        display: block;
        margin-bottom: 7px;
        text-transform: uppercase;
      }
      textarea,
      select,
      input[type="date"],
      input[type="time"],
      .lnk input {
        font: inherit;
        font-size: 13px;
        border: 1px solid var(--hair);
        border-radius: 9px;
        padding: 9px 10px;
        outline: none;
        width: 100%;
        background: var(--sunk);
        transition:
          border-color 0.15s,
          background 0.15s;
      }
      textarea:focus,
      select:focus,
      input[type="date"]:focus,
      input[type="time"]:focus,
      .lnk input:focus {
        border-color: var(--accent);
        background: var(--surface);
      }
      textarea {
        resize: vertical;
        min-height: 70px;
      }
      .row2 {
        display: flex;
        gap: 12px;
      }
      .row2 .fld {
        flex: 1;
      }
      .chk {
        display: flex;
        align-items: center;
        gap: 9px;
        font-size: 13px;
        cursor: pointer;
        user-select: none;
      }
      .chk input {
        width: 16px;
        height: 16px;
        accent-color: var(--accent);
      }
      .lnk {
        display: flex;
        gap: 6px;
        margin-bottom: 6px;
      }
      .addlnk {
        font-size: 12px;
        color: var(--accent);
        background: none;
        border: none;
        cursor: pointer;
        padding: 4px 0;
      }
      .peek-foot {
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-top: 1px solid var(--hair);
        padding-top: 16px;
        margin-top: 4px;
      }
      .peek-foot .meta {
        font-size: 11px;
        color: var(--ink3);
      }
      .danger {
        color: var(--crit);
        background: none;
        border: none;
        cursor: pointer;
        font-size: 13px;
        padding: 6px 8px;
        border-radius: 8px;
      }
      .danger:hover {
        background: #fbeee9;
      }

      /* category manager（簡易） */
      .catrow {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 11px 0;
      }
      .catrow + .catrow {
        border-top: 1px solid var(--hair);
      }
      .catrow .nm {
        flex: 1;
        font-size: 14px;
      }
      .catrow .cnt {
        font-size: 12px;
        color: var(--ink3);
      }

      .pop {
        position: absolute;
        background: var(--surface);
        border: 1px solid var(--hair);
        border-radius: var(--r);
        box-shadow: 0 16px 48px rgba(20, 30, 28, 0.16);
        padding: 16px;
        z-index: 40;
        width: 260px;
        display: none;
      }
      .pop.on {
        display: block;
      }
      .pop .pt {
        font-size: 12px;
        color: var(--ink2);
        margin-bottom: 12px;
        font-weight: 500;
      }
      .pop input {
        margin-bottom: 10px;
      }
      .pop .mini {
        width: 100%;
        padding: 9px;
      }

      @media (max-width: 900px) {
        .ws {
          grid-template-columns: 1fr;
          gap: 28px;
        }
        .peek {
          width: 100%;
        }
        .scroll,
        .topbar {
          padding-left: 18px;
          padding-right: 18px;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        * {
          transition: none !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="app" id="app">
      <div class="topbar">
        <div class="brand">
          <h1>Ichimoku</h1>
          <span class="tag">案A — 静寂</span>
        </div>
        <div class="top-actions">
          <button class="ghost" id="catBtn">カテゴリ</button>
          <span class="who">プレビュー（モックデータ）</span>
          <button class="ghost">ログアウト</button>
        </div>
      </div>

      <div class="scroll">
        <section class="rail">
          <div class="rail-h">
            <span class="l">近日締切</span><span class="h">締切順 ・ クリックで詳細</span>
          </div>
          <div class="rail-row" id="rail"></div>
        </section>

        <div class="ws">
          <section class="panel">
            <div class="ph">
              <span class="tt">タスク</span><span class="sub">縦＝カテゴリ ／ 横＝状態</span>
              <div class="right">
                <div class="quick">
                  <input id="qadd" placeholder="パッと追加（Enter）" />
                  <span class="hint">未分類へ</span>
                </div>
              </div>
            </div>
            <div class="shead">
              <span>未着手</span><span>対応中</span><span class="d">完了</span>
            </div>
            <div id="board"></div>
          </section>

          <section class="panel">
            <div class="ph">
              <span class="tt">カレンダー</span><span class="sub">6月 第3週</span>
              <div class="right"><button class="mini" id="addEvBtn">＋ 予定</button></div>
            </div>
            <div class="agenda" id="agenda"></div>
          </section>
        </div>
      </div>

      <div class="backdrop" id="backdrop"></div>
      <aside class="peek" id="peek"><div class="peek-in" id="peekIn"></div></aside>
      <div class="pop" id="evPop">
        <div class="pt">予定を追加（今日）</div>
        <input id="evTime" placeholder="時刻 例 14:00" class="mono" />
        <input id="evTitle" placeholder="タイトル 例 MR面談" />
        <button class="mini" id="evAdd">追加</button>
      </div>
    </div>

    <script>
      /* ===== 共通エンジン（3案で同一のデータ・機能） ===== */
      const TODAY = new Date("2026-06-16T00:00:00");
      const CATS = [
        { id: "mibun", name: "未分類", color: "#9aa29f" },
        { id: "jimu", name: "事務", color: "#6b7c93" },
        { id: "keiei", name: "経営", color: "#8a6d3b" },
        { id: "saiyo", name: "採用", color: "#7a5c8e" },
      ];
      const STATUS = [
        ["todo", "未着手"],
        ["doing", "対応中"],
        ["done", "完了"],
      ];
      let seq = 100;
      let tasks = [
        {
          id: 1,
          title: "レセプト点検（5月分）",
          cat: "jimu",
          status: "todo",
          due: null,
          memo: "",
          links: [],
        },
        {
          id: 2,
          title: "社会保険料の納付",
          cat: "jimu",
          status: "todo",
          due: "2026-06-20",
          memo: "口座振替の残高確認",
          links: [{ title: "年金事務所", url: "https://example.com" }],
        },
        {
          id: 3,
          title: "請求書の発行（5件）",
          cat: "jimu",
          status: "doing",
          due: null,
          memo: "",
          links: [],
        },
        {
          id: 4,
          title: "経費精算の締め",
          cat: "jimu",
          status: "done",
          due: null,
          memo: "",
          links: [],
        },
        {
          id: 5,
          title: "決算準備（資料一式）",
          cat: "keiei",
          status: "todo",
          due: "2026-06-30",
          memo: "",
          links: [],
        },
        {
          id: 6,
          title: "月次レポート提出",
          cat: "keiei",
          status: "doing",
          due: "2026-06-25",
          memo: "",
          links: [],
        },
        {
          id: 7,
          title: "銀行面談の資料づくり",
          cat: "keiei",
          status: "doing",
          due: null,
          memo: "",
          links: [],
        },
        {
          id: 8,
          title: "薬剤師 面接の日程調整",
          cat: "saiyo",
          status: "doing",
          due: null,
          memo: "",
          links: [],
        },
        {
          id: 9,
          title: "求人票の更新",
          cat: "saiyo",
          status: "todo",
          due: null,
          memo: "",
          links: [],
        },
      ];
      let events = [
        { id: 1, time: "14:00", title: "MR面談（恵比寿）" },
        { id: 2, time: "16:00", title: "商工会 講演" },
      ];
      const collapsed = {};

      const $ = (s) => document.querySelector(s);
      function dueInfo(due) {
        if (!due) return null;
        const d = new Date(due + "T00:00:00");
        const days = Math.round((d - TODAY) / 86400000);
        let cls = "";
        if (days <= 3) cls = "crit";
        else if (days <= 7) cls = "warn";
        return { days, cls, md: d.getMonth() + 1 + "/" + d.getDate() };
      }
      function esc(s) {
        return (s || "").replace(
          /[&<>"]/g,
          (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c]
        );
      }
      const catName = (id) => (CATS.find((c) => c.id === id) || {}).name || "";
      const catColor = (id) => (CATS.find((c) => c.id === id) || {}).color || "#999";

      function renderRail() {
        const items = tasks
          .filter((t) => t.due && t.status !== "done")
          .sort((a, b) => (a.due < b.due ? -1 : 1));
        const el = $("#rail");
        if (!items.length) {
          el.innerHTML = '<div class="rail-empty">締切のあるタスクはまだありません</div>';
          return;
        }
        el.innerHTML = items
          .map((t) => {
            const di = dueInfo(t.due);
            const left = di.days < 0 ? "期限切れ" : "あと " + di.days + "日";
            return `<div class="dchip ${di.cls}" data-id="${t.id}">
            <div class="t">${esc(t.title)}</div>
            <div class="m"><span class="dt">${di.md}</span><span class="lf mono">${left}</span></div></div>`;
          })
          .join("");
        el.querySelectorAll(".dchip").forEach((c) => (c.onclick = () => openPeek(+c.dataset.id)));
      }

      function renderBoard() {
        const board = $("#board");
        board.innerHTML = CATS.map((cat) => {
          const inCat = tasks.filter((t) => t.cat === cat.id);
          const isCol = collapsed[cat.id];
          const cells = STATUS.map(([sk]) => {
            const cards =
              inCat
                .filter((t) => t.status === sk)
                .map((t) => {
                  const di = dueInfo(t.due);
                  const chip = di
                    ? `<div class="meta"><span class="due ${di.cls}">締切 <span class="mono">${di.md}</span></span></div>`
                    : "";
                  return `<div class="card ${sk === "done" ? "donecard" : ""}" data-id="${t.id}"><span class="ct">${esc(t.title)}</span>${chip}</div>`;
                })
                .join("") || '<div class="cell-empty">—</div>';
            return `<div class="cell">${cards}</div>`;
          }).join("");
          return `<div class="lane ${isCol ? "col" : ""}" data-cat="${cat.id}">
            <div class="lane-h"><span class="dot" style="background:${cat.color}"></span>
              <span class="nm">${cat.name}</span><span class="ct">${inCat.length}</span><span class="cv">▾</span></div>
            <div class="cells">${cells}</div></div>`;
        }).join("");
        board.querySelectorAll(".lane-h").forEach(
          (h) =>
            (h.onclick = () => {
              const cid = h.parentElement.dataset.cat;
              collapsed[cid] = !collapsed[cid];
              renderBoard();
            })
        );
        board.querySelectorAll(".card").forEach(
          (c) =>
            (c.onclick = (e) => {
              e.stopPropagation();
              openPeek(+c.dataset.id);
            })
        );
      }

      function renderAgenda() {
        const evToday = events;
        const days = [
          { n: 16, w: "月・今日", today: true, evs: evToday },
          { n: 17, w: "火", evs: [{ time: "10:00", title: "店舗ミーティング" }] },
          { n: 18, w: "水", evs: [] },
          { n: 19, w: "木", evs: [{ time: "15:00", title: "税理士 打ち合わせ" }] },
        ];
        $("#agenda").innerHTML = days
          .map((d) => {
            const evs = d.evs.length
              ? d.evs
                  .map(
                    (e) =>
                      `<div class="ev ${d.today ? "acc" : ""}"><span class="tm mono">${esc(e.time)}</span><span class="tl">${esc(e.title)}</span></div>`
                  )
                  .join("")
              : '<div class="empty">予定なし</div>';
            return `<div class="day ${d.today ? "today" : ""}"><div><div class="dnum">${d.n}</div><div class="dwk">${d.w}</div></div><div class="evs">${evs}</div></div>`;
          })
          .join("");
      }

      /* ---------- side-peek（タスク詳細・自動保存） ---------- */
      function flashSaved() {
        const s = $("#peekSaved");
        if (!s) return;
        s.classList.add("show");
        clearTimeout(s._t);
        s._t = setTimeout(() => s.classList.remove("show"), 900);
      }
      function openPeek(id) {
        const t = tasks.find((x) => x.id === id);
        if (!t) return;
        const catOpts = CATS.map(
          (c) => `<option value="${c.id}" ${c.id === t.cat ? "selected" : ""}>${c.name}</option>`
        ).join("");
        const stOpts = STATUS.map(
          ([k, l]) => `<option value="${k}" ${k === t.status ? "selected" : ""}>${l}</option>`
        ).join("");
        const links = t.links
          .map(
            (l, i) =>
              `<div class="lnk"><input data-li="${i}" data-k="title" value="${esc(l.title)}" placeholder="ラベル（任意）"/><input data-li="${i}" data-k="url" value="${esc(l.url)}" placeholder="https://…" style="color:var(--accent)"/></div>`
          )
          .join("");
        $("#peekIn").innerHTML = `
          <div class="peek-top"><span class="lab">タスク詳細</span>
            <span class="saved" id="peekSaved">保存済み ✓</span><button class="x" id="peekX">×</button></div>
          <input class="f-title" id="fTitle" value="${esc(t.title)}"/>
          <div class="fld"><label>メモ</label><textarea id="fMemo" placeholder="補足や手順">${esc(t.memo)}</textarea></div>
          <div class="fld"><label>リンク</label><div id="fLinks">${links}</div><button class="addlnk" id="addLnk">＋ リンクを追加</button></div>
          <div class="fld"><label class="chk"><input type="checkbox" id="fDueChk" ${t.due ? "checked" : ""}/> 締切を設定</label>
            <div id="fDueWrap" style="margin-top:8px;${t.due ? "" : "display:none"}"><input type="date" id="fDue" value="${t.due || ""}"/></div></div>
          <div class="row2"><div class="fld"><label>カテゴリ</label><select id="fCat">${catOpts}</select></div>
            <div class="fld"><label>状態</label><select id="fStatus">${stOpts}</select></div></div>
          <div class="peek-foot"><span class="meta">作成 6/14 ・ 更新 6/15</span><button class="danger" id="fDel">削除</button></div>`;

        $("#fTitle").oninput = (e) => {
          t.title = e.target.value;
          renderBoard();
          renderRail();
          flashSaved();
        };
        $("#fMemo").oninput = (e) => {
          t.memo = e.target.value;
          flashSaved();
        };
        $("#fCat").onchange = (e) => {
          t.cat = e.target.value;
          renderBoard();
          flashSaved();
        };
        $("#fStatus").onchange = (e) => {
          t.status = e.target.value;
          renderBoard();
          renderRail();
          flashSaved();
        };
        $("#fDueChk").onchange = (e) => {
          const w = $("#fDueWrap");
          if (e.target.checked) {
            w.style.display = "";
          } else {
            w.style.display = "none";
            t.due = null;
            renderBoard();
            renderRail();
            flashSaved();
          }
        };
        $("#fDue").onchange = (e) => {
          t.due = e.target.value || null;
          renderBoard();
          renderRail();
          flashSaved();
        };
        $("#addLnk").onclick = () => {
          t.links.push({ title: "", url: "" });
          openPeek(id);
        };
        $("#peekIn")
          .querySelectorAll("#fLinks input")
          .forEach(
            (inp) =>
              (inp.oninput = (e) => {
                const i = +e.target.dataset.li,
                  k = e.target.dataset.k;
                t.links[i][k] = e.target.value;
                flashSaved();
              })
          );
        $("#fDel").onclick = () => {
          tasks = tasks.filter((x) => x.id !== id);
          closePeek();
          renderBoard();
          renderRail();
        };
        $("#peekX").onclick = closePeek;
        $("#peek").classList.add("on");
        $("#backdrop").classList.add("on");
      }

      /* ---------- side-peek（カテゴリ管理・簡易デモ） ---------- */
      function openCats() {
        const rows = CATS.map((c) => {
          const cnt = tasks.filter((t) => t.cat === c.id).length;
          return `<div class="catrow"><span class="dot" style="background:${c.color}"></span><span class="nm">${c.name}</span><span class="cnt">${cnt} 件</span></div>`;
        }).join("");
        $("#peekIn").innerHTML = `
          <div class="peek-top"><span class="lab">カテゴリ管理</span><button class="x" id="peekX">×</button></div>
          <div>${rows}</div>
          <button class="addlnk" id="addCat">＋ カテゴリを追加</button>`;
        $("#peekX").onclick = closePeek;
        $("#addCat").onclick = () => {
          alert("（デモ）カテゴリ追加 — 本実装で CRUD を提供");
        };
        $("#peek").classList.add("on");
        $("#backdrop").classList.add("on");
      }

      function closePeek() {
        $("#peek").classList.remove("on");
        $("#backdrop").classList.remove("on");
      }

      /* ---------- quick add ---------- */
      $("#qadd").addEventListener("keydown", (e) => {
        if (e.key === "Enter" && e.target.value.trim()) {
          tasks.unshift({
            id: ++seq,
            title: e.target.value.trim(),
            cat: "mibun",
            status: "todo",
            due: null,
            memo: "",
            links: [],
          });
          e.target.value = "";
          collapsed["mibun"] = false;
          renderBoard();
        }
      });

      /* ---------- event popover ---------- */
      const evPop = $("#evPop");
      $("#addEvBtn").onclick = (e) => {
        e.stopPropagation();
        const b = $("#addEvBtn").getBoundingClientRect(),
          a = $("#app").getBoundingClientRect();
        evPop.style.top = b.bottom - a.top + 8 + "px";
        evPop.style.left = Math.max(8, b.right - a.left - 260) + "px";
        evPop.classList.add("on");
        $("#evTime").focus();
      };
      $("#evAdd").onclick = () => {
        const tm = $("#evTime").value.trim(),
          tl = $("#evTitle").value.trim();
        if (tm && tl) {
          events.push({ time: tm, title: tl });
          events.sort((a, b) => (a.time < b.time ? -1 : 1));
          renderAgenda();
        }
        $("#evTime").value = "";
        $("#evTitle").value = "";
        evPop.classList.remove("on");
      };
      $("#catBtn").onclick = openCats;

      /* ---------- global dismiss ---------- */
      $("#backdrop").onclick = closePeek;
      document.addEventListener("click", (e) => {
        if (
          evPop.classList.contains("on") &&
          !evPop.contains(e.target) &&
          e.target.id !== "addEvBtn"
        )
          evPop.classList.remove("on");
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          closePeek();
          evPop.classList.remove("on");
        }
      });

      renderRail();
      renderBoard();
      renderAgenda();
    </script>
  </body>
</html>
