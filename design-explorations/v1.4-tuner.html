<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ichimoku — 配色調整ポータル（モック）</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700&family=Zen+Old+Mincho:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&family=IBM+Plex+Sans+JP:wght@400;500;600&family=Roboto+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      /* =========================================================
         配色調整ポータル
         ・右側は本番と同一の UI／機能（B-warm.html のエンジン）。
         ・左ドロワーで本番 index.css と同名・同数のトークンを 1:1 調整。
           値はモック用エイリアス（--page など）へ流し込んで即反映する。
         ・「コピー」で index.css の :root にそのまま貼れるブロックを生成。
         ========================================================= */
      :root {
        /* モック描画用エイリアス（初期値＝現状 index.css）。ポータルが上書き */
        --page: #f3eee3;
        --surface: #fbf8f1;
        --card: #fbf8f1;
        --sunk: #efe9db;
        --ink: #33302a;
        --ink2: #6f685c;
        --ink3: #a39a89;
        --hair: #e3dccb;
        --hair2: #d6cdb8;
        --accent: #b2542f;
        --accent-soft: #f3e3d8;
        --crit: #a8341f;
        --crit-soft: #f4ddd4;
        --warn: #98701f;
        --warn-soft: #f1e7cf;
        --r: 8px;
        --r2: 6px;
        --font-body: "Noto Sans JP", sans-serif;
        --font-head: "Shippori Mincho", serif;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        font-family: var(--font-body);
        background: var(--page);
        color: var(--ink);
        font-size: 14px;
        line-height: 1.7;
        -webkit-font-smoothing: antialiased;
      }
      .mono {
        font-family: "Roboto Mono", monospace;
        font-variant-numeric: tabular-nums;
      }
      .wrap {
        display: flex;
        height: 100vh;
        overflow: hidden;
      }

      /* ===== 調整ポータル（プレビュー専用・本番には載らない） ===== */
      .tuner {
        flex: 0 0 320px;
        width: 320px;
        height: 100vh;
        overflow-y: auto;
        background: #201d17;
        color: #ece3d2;
        border-right: 1px solid #000;
        transition: margin-left 0.22s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .wrap.collapsed .tuner {
        margin-left: -320px;
      }
      .tuner-h {
        position: sticky;
        top: 0;
        background: #1a1712;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 14px 14px 12px;
        border-bottom: 1px solid #322c22;
        z-index: 2;
      }
      .tuner-h .tt {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.04em;
      }
      .tuner-h .sub {
        font-size: 10px;
        color: #8d816b;
      }
      .tuner-h .collapse {
        margin-left: auto;
        background: #2c281f;
        border: 1px solid #4a4338;
        color: #d8cdb6;
        border-radius: 6px;
        width: 30px;
        height: 30px;
        cursor: pointer;
        font-size: 15px;
      }
      .tuner-body {
        padding: 12px 14px 40px;
      }
      .presets {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 14px;
      }
      .presets button {
        font: inherit;
        font-size: 12px;
        border: 1px solid #4a4338;
        background: #2c281f;
        color: #e8dfcd;
        border-radius: 6px;
        padding: 6px 10px;
        cursor: pointer;
        flex: 1;
      }
      .presets button:hover {
        border-color: #c75a34;
      }
      .tgrp {
        font-size: 10px;
        letter-spacing: 0.12em;
        color: #8d816b;
        margin: 16px 0 6px;
        padding-bottom: 4px;
        border-bottom: 1px solid #322c22;
      }
      .trow {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 4px 0;
      }
      .trow .tlab {
        flex: 1;
        font-size: 12px;
        color: #cabfa8;
      }
      .trow input[type="color"] {
        width: 30px;
        height: 26px;
        padding: 0;
        border: 1px solid #4a4338;
        border-radius: 5px;
        background: none;
        cursor: pointer;
      }
      .trow input[type="color"]::-webkit-color-swatch-wrapper {
        padding: 2px;
      }
      .trow input[type="color"]::-webkit-color-swatch {
        border: none;
        border-radius: 3px;
      }
      .trow .thex {
        width: 82px;
        font: inherit;
        font-family: "Roboto Mono", monospace;
        font-size: 11px;
        text-transform: lowercase;
        background: #15120e;
        border: 1px solid #3a3429;
        color: #d8cdb6;
        border-radius: 5px;
        padding: 5px 6px;
        outline: none;
      }
      .trow .thex:focus {
        border-color: #c75a34;
      }
      .trow.invalid .thex {
        border-color: #c0492a;
        color: #e7a78f;
      }
      .ctrl {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 0;
      }
      .ctrl .tlab {
        flex: 1;
        font-size: 12px;
        color: #cabfa8;
      }
      .ctrl input[type="range"] {
        flex: 1;
        accent-color: #c75a34;
      }
      .ctrl .val {
        font-family: "Roboto Mono", monospace;
        font-size: 11px;
        color: #9a8e78;
        min-width: 38px;
        text-align: right;
      }
      .fontbtns {
        display: flex;
        gap: 6px;
      }
      .fontbtns button {
        flex: 1;
        font: inherit;
        font-size: 11px;
        border: 1px solid #4a4338;
        background: #2c281f;
        color: #e8dfcd;
        border-radius: 6px;
        padding: 6px 8px;
        cursor: pointer;
      }
      .fontbtns button.on {
        background: #c75a34;
        border-color: #c75a34;
        color: #fff;
      }
      .export {
        margin-top: 18px;
        border-top: 1px solid #322c22;
        padding-top: 14px;
      }
      .export .row {
        display: flex;
        gap: 6px;
        margin-bottom: 8px;
      }
      .export button {
        font: inherit;
        font-size: 12px;
        border: 1px solid #4a4338;
        background: #2c281f;
        color: #e8dfcd;
        border-radius: 6px;
        padding: 7px 10px;
        cursor: pointer;
        flex: 1;
      }
      .export button.primary {
        background: #c75a34;
        border-color: #c75a34;
        color: #fff;
      }
      .export textarea {
        width: 100%;
        height: 150px;
        font-family: "Roboto Mono", monospace;
        font-size: 10.5px;
        line-height: 1.5;
        background: #15120e;
        border: 1px solid #3a3429;
        color: #c8bda4;
        border-radius: 6px;
        padding: 8px;
        resize: vertical;
        outline: none;
      }
      .reopen {
        position: fixed;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        z-index: 70;
        background: #c75a34;
        color: #fff;
        border: none;
        border-radius: 0 8px 8px 0;
        padding: 12px 8px;
        cursor: pointer;
        writing-mode: vertical-rl;
        letter-spacing: 0.1em;
        font: inherit;
        font-size: 12px;
        display: none;
      }
      .wrap.collapsed ~ .reopen {
        display: block;
      }

      /* ===== ここから下は本番 UI と同一（トークン参照のみ） ===== */
      .app {
        position: relative;
        flex: 1;
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .scroll {
        flex: 1;
        overflow: auto;
        padding: 8px 30px 48px;
      }
      .topbar {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 22px 30px 14px;
      }
      .brand {
        display: flex;
        align-items: baseline;
        gap: 12px;
      }
      .brand h1 {
        font-family: var(--font-head);
        font-size: 27px;
        font-weight: 700;
        letter-spacing: 0.06em;
        margin: 0;
        color: var(--ink);
      }
      .brand .tag {
        font-size: 12px;
        color: var(--ink3);
        letter-spacing: 0.04em;
      }
      .top-actions {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .btn {
        font: inherit;
        font-size: 13px;
        border: 1px solid var(--hair2);
        background: var(--surface);
        color: var(--ink);
        border-radius: var(--r2);
        padding: 8px 14px;
        cursor: pointer;
        min-height: 36px;
      }
      .btn:hover {
        background: var(--sunk);
      }
      .who {
        font-size: 12px;
        color: var(--ink3);
        padding: 0 4px;
      }
      .rail {
        background: var(--surface);
        border: 1px solid var(--hair);
        border-radius: var(--r);
        padding: 16px 18px;
        margin-bottom: 20px;
        box-shadow: 0 1px 2px rgba(60, 50, 35, 0.05);
      }
      .rail-h {
        display: flex;
        align-items: baseline;
        gap: 12px;
        margin: 0 0 12px;
      }
      .rail-h .l {
        font-family: var(--font-head);
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.08em;
      }
      .rail-h .h {
        font-size: 12px;
        color: var(--ink3);
      }
      .rail-row {
        display: flex;
        gap: 12px;
        overflow-x: auto;
        padding-bottom: 2px;
        min-height: 30px;
      }
      .dchip {
        flex: 0 0 auto;
        min-width: 178px;
        background: var(--sunk);
        border-radius: var(--r2);
        padding: 10px 13px 11px 16px;
        position: relative;
        cursor: pointer;
        border: 1px solid transparent;
        transition:
          border-color 0.12s,
          transform 0.12s;
      }
      .dchip:hover {
        border-color: var(--hair2);
        transform: translateY(-1px);
      }
      .dchip::before {
        content: "";
        position: absolute;
        left: 0;
        top: 10px;
        bottom: 10px;
        width: 3px;
        border-radius: 3px;
        background: var(--ink3);
      }
      .dchip.crit::before {
        background: var(--crit);
      }
      .dchip.warn::before {
        background: var(--warn);
      }
      .dchip .t {
        font-size: 13.5px;
        font-weight: 500;
      }
      .dchip .m {
        display: flex;
        justify-content: space-between;
        margin-top: 6px;
      }
      .dchip .dt {
        font-size: 11px;
        color: var(--ink3);
      }
      .dchip .lf {
        font-size: 12px;
        font-weight: 500;
        color: var(--ink2);
      }
      .dchip.crit .lf {
        color: var(--crit);
      }
      .dchip.warn .lf {
        color: var(--warn);
      }
      .rail-empty {
        font-size: 13px;
        color: var(--ink3);
        padding: 4px;
      }
      .ws {
        display: grid;
        grid-template-columns: 1.7fr 1fr;
        gap: 20px;
        align-items: start;
      }
      .panel {
        background: var(--surface);
        border: 1px solid var(--hair);
        border-radius: var(--r);
        box-shadow: 0 1px 2px rgba(60, 50, 35, 0.05);
      }
      .ph {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 16px 18px 14px;
        border-bottom: 1px solid var(--hair);
      }
      .ph .tt {
        font-family: var(--font-head);
        font-size: 17px;
        font-weight: 600;
        letter-spacing: 0.04em;
      }
      .ph .sub {
        font-size: 11px;
        color: var(--ink3);
      }
      .ph .right {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .quick {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--page);
        border: 1px solid var(--hair2);
        border-radius: var(--r2);
        padding: 0 10px;
        min-width: 210px;
      }
      .quick input {
        border: none;
        outline: none;
        background: transparent;
        flex: 1;
        font: inherit;
        font-size: 13px;
        padding: 7px 2px;
        color: var(--ink);
      }
      .quick .hint {
        font-size: 11px;
        color: var(--ink3);
        white-space: nowrap;
      }
      .mini {
        font: inherit;
        font-size: 13px;
        border: 1px solid var(--accent);
        background: var(--accent);
        color: #fff;
        border-radius: var(--r2);
        padding: 7px 14px;
        cursor: pointer;
        min-height: 34px;
        font-weight: 500;
      }
      .mini:hover {
        background: color-mix(in srgb, var(--accent), #000 12%);
      }
      .shead {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        padding: 12px 18px 0;
      }
      .shead span {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        color: var(--ink2);
      }
      .shead .d {
        color: var(--ink3);
      }
      .lane {
        padding: 8px 18px 4px;
      }
      .lane + .lane {
        border-top: 1px solid var(--hair);
      }
      .lane-h {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 8px 2px;
        cursor: pointer;
        user-select: none;
      }
      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
      }
      .lane-h .nm {
        font-family: var(--font-head);
        font-size: 14px;
        font-weight: 600;
      }
      .lane-h .ct {
        font-size: 11px;
        color: var(--ink3);
      }
      .lane-h .cv {
        margin-left: auto;
        color: var(--ink3);
        font-size: 10px;
        transition: transform 0.15s;
      }
      .lane.col .cv {
        transform: rotate(-90deg);
      }
      .lane.col .cells {
        display: none;
      }
      .cells {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        padding-bottom: 8px;
      }
      .cell {
        min-height: 30px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--hair);
        border-left: 3px solid var(--ink3);
        border-radius: var(--r2);
        padding: 9px 11px;
        display: flex;
        flex-direction: column;
        gap: 7px;
        cursor: pointer;
        transition:
          box-shadow 0.14s,
          transform 0.14s;
        box-shadow: 0 1px 2px rgba(60, 50, 35, 0.06);
      }
      .card:hover {
        box-shadow: 0 3px 10px rgba(60, 50, 35, 0.12);
        transform: translateY(-1px);
      }
      .card .ct {
        font-size: 13px;
        line-height: 1.5;
      }
      .card .meta {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .due {
        font-size: 11px;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        color: var(--ink2);
        background: var(--sunk);
        padding: 2px 8px;
        border-radius: 20px;
      }
      .due.crit {
        color: var(--crit);
        background: var(--crit-soft);
      }
      .due.warn {
        color: var(--warn);
        background: var(--warn-soft);
      }
      .donecard {
        opacity: 0.6;
      }
      .donecard .ct {
        text-decoration: line-through;
        color: var(--ink2);
      }
      .cell-empty {
        font-size: 11px;
        color: var(--hair2);
        padding: 4px 2px;
      }
      .agenda {
        padding: 8px 14px 14px;
      }
      .day {
        display: grid;
        grid-template-columns: 52px 1fr;
        gap: 12px;
        padding: 11px 6px;
        border-radius: var(--r2);
      }
      .day + .day {
        border-top: 1px solid var(--hair);
      }
      .day.today {
        background: var(--accent-soft);
      }
      .dnum {
        font-family: var(--font-head);
        font-size: 20px;
        font-weight: 700;
        line-height: 1;
      }
      .dwk {
        font-size: 11px;
        color: var(--ink3);
        margin-top: 3px;
      }
      .day.today .dnum {
        color: var(--accent);
      }
      .day.today .dwk {
        color: var(--accent);
      }
      .evs {
        display: flex;
        flex-direction: column;
        gap: 7px;
        padding-top: 2px;
      }
      .ev {
        display: flex;
        gap: 10px;
        align-items: center;
        background: var(--sunk);
        border-radius: var(--r2);
        padding: 6px 10px;
        cursor: pointer;
        transition: background 0.12s;
      }
      .ev:hover {
        background: color-mix(in srgb, var(--sunk), #000 7%);
      }
      .ev.acc {
        background: var(--card);
        border-left: 3px solid var(--accent);
      }
      .ev .tm {
        font-size: 11px;
        color: var(--ink2);
        min-width: 42px;
      }
      .ev .tl {
        font-size: 13px;
      }
      .empty {
        font-size: 11px;
        color: var(--ink3);
      }
      .backdrop {
        position: absolute;
        inset: 0;
        background: rgba(40, 33, 22, 0.18);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.18s;
        z-index: 20;
      }
      .backdrop.on {
        opacity: 1;
        pointer-events: auto;
      }
      .peek {
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        width: 390px;
        background: var(--surface);
        border-left: 1px solid var(--hair2);
        box-shadow: -10px 0 30px rgba(40, 33, 22, 0.12);
        transform: translateX(100%);
        transition: transform 0.22s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 30;
        display: flex;
        flex-direction: column;
      }
      .peek.on {
        transform: translateX(0);
      }
      .peek-in {
        padding: 22px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        overflow: auto;
      }
      .peek-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .peek-top .lab {
        font-family: var(--font-head);
        font-size: 13px;
        letter-spacing: 0.08em;
        color: var(--ink2);
      }
      .peek-top .saved {
        font-size: 11px;
        color: var(--accent);
        opacity: 0;
        transition: opacity 0.2s;
        margin-left: auto;
        margin-right: 10px;
      }
      .peek-top .saved.show {
        opacity: 1;
      }
      .x {
        cursor: pointer;
        color: var(--ink3);
        font-size: 19px;
        line-height: 1;
        border: none;
        background: none;
        width: 32px;
        height: 32px;
        border-radius: 6px;
      }
      .x:hover {
        background: var(--sunk);
        color: var(--ink);
      }
      .f-title {
        font-family: var(--font-head);
        font-size: 19px;
        font-weight: 600;
        border: none;
        border-bottom: 1px solid var(--hair2);
        border-radius: 0;
        padding: 6px 0;
        outline: none;
        background: transparent;
        color: var(--ink);
      }
      .f-title:focus {
        border-color: var(--accent);
      }
      .fld label {
        font-size: 12px;
        color: var(--ink2);
        display: block;
        margin-bottom: 7px;
      }
      textarea.f,
      select,
      input[type="date"],
      input[type="time"],
      .lnk input {
        font: inherit;
        font-size: 13px;
        border: 1px solid var(--hair2);
        border-radius: var(--r2);
        padding: 9px 10px;
        outline: none;
        width: 100%;
        background: var(--page);
        color: var(--ink);
      }
      textarea.f:focus,
      select:focus,
      input[type="date"]:focus,
      input[type="time"]:focus,
      .lnk input:focus {
        border-color: var(--accent);
      }
      textarea.f {
        resize: vertical;
        min-height: 66px;
      }
      .row2 {
        display: flex;
        gap: 12px;
      }
      .row2 .fld {
        flex: 1;
      }
      .chk {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        cursor: pointer;
        user-select: none;
      }
      .chk input {
        width: 16px;
        height: 16px;
        accent-color: var(--accent);
      }
      .lnk {
        display: flex;
        gap: 6px;
        margin-bottom: 6px;
      }
      .addlnk {
        font-size: 12px;
        color: var(--accent);
        background: none;
        border: none;
        cursor: pointer;
        padding: 4px 0;
      }
      .peek-foot {
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-top: 1px solid var(--hair);
        padding-top: 14px;
        margin-top: 2px;
      }
      .peek-foot .meta {
        font-size: 11px;
        color: var(--ink3);
      }
      .danger {
        color: var(--crit);
        background: none;
        border: none;
        cursor: pointer;
        font-size: 13px;
        padding: 6px 8px;
        border-radius: 6px;
      }
      .danger:hover {
        background: var(--crit-soft);
      }
      .catrow {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 11px 0;
      }
      .catrow + .catrow {

      .pop {
        position: absolute;
        background: var(--surface);
        border: 1px solid var(--hair2);
        border-radius: var(--r);
        box-shadow: 0 14px 40px rgba(40, 33, 22, 0.18);
        padding: 16px;
        z-index: 40;
        width: 256px;
        display: none;

        display: block;
      }
      .pop .pt {
        font-family: var(--font-head);
        font-size: 13px;
        color: var(--ink);
        margin-bottom: 12px;
      }
      .pop input {
        margin-bottom: 10px;
      }
      .pop .mini {
        width: 100%;
        padding: 9px;
      }
      @media (prefers-reduced-motion: reduce) {
        * {
          transition: none !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap" id="wrap">
      <!-- ===== 調整ポータル ===== -->
      <aside class="tuner" id="tuner">
        <div class="tuner-h">
          <div>
            <div class="tt">調整ポータル</div>
            <div class="sub">本番 index.css と同名トークン</div>
          </div>
          <button class="collapse" id="collapse" title="閉じる">«</button>
        </div>
        <div class="tuner-body">
          <div class="presets" id="presets">
            <button data-preset="cur">現状</button>
            <button data-preset="p1">案1 強化</button>
            <button data-preset="p2">案2 ペーパー</button>
            <button data-preset="p3">案3 モダン</button>
          </div>
          <div id="tokenRows"></div>

          <div class="tgrp">角丸・書体</div>
          <div class="ctrl">
            <span class="tlab">角丸 --radius</span>
            <input type="range" id="radius" min="0" max="16" step="1" />
            <span class="val" id="radiusVal"></span>

          <div class="ctrl">

            <div class="fontbtns" style="flex: 2">
              <button data-font="std">標準</button>
              <button data-font="crisp">くっきり</button>
            </div>
          </div>

          <div class="export">
            <div class="row">
              <button class="primary" id="copyBtn">index.css をコピー</button>
              <button id="resetBtn">現状に戻す</button>
            </div>
            <textarea id="exportArea" readonly spellcheck="false"></textarea>
          </div>
        </div>
      </aside>

      <!-- ===== 本番 UI（モック） ===== -->
      <div class="app" id="app">
        <div class="topbar">
          <div class="brand">
            <h1>一目</h1>
            <span class="tag">Ichimoku ・ 配色調整ポータル</span>
          </div>
          <div class="top-actions">
            <button class="btn" id="catBtn">カテゴリ</button>
            <span class="who">プレビュー（モックデータ）</span>
            <button class="btn">ログアウト</button>
          </div>
        </div>

        <div class="scroll">
          <section class="rail">
            <div class="rail-h">
              <span class="l">近日締切</span><span class="h">締切順 ・ クリックで詳細</span>
            </div>
            <div class="rail-row" id="rail"></div>
          </section>

          <div class="ws">
            <section class="panel">
              <div class="ph">
                <span class="tt">タスク</span><span class="sub">縦＝カテゴリ ／ 横＝状態</span>
                <div class="right">
                  <div class="quick">
                    <input id="qadd" placeholder="パッと追加（Enter）" /><span class="hint"
                      >未分類へ</span
                    >
                  </div>

              </div>
              <div class="shead">
                <span>未着手</span><span>対応中</span><span class="d">完了</span>
              </div>
              <div id="board"></div>
            </section>

            <section class="panel">
              <div class="ph">
                <span class="tt">カレンダー</span><span class="sub">6月 第3週</span>
                <div class="right"><button class="mini" id="addEvBtn">＋ 予定</button></div>
              </div>
              <div class="agenda" id="agenda"></div>
            </section>
          </div>
        </div>

        <div class="backdrop" id="backdrop"></div>
        <aside class="peek" id="peek"><div class="peek-in" id="peekIn"></div></aside>
        <div class="pop" id="evPop">
          <div class="pt">予定を追加（今日）</div>
          <input id="evTime" placeholder="時刻 例 14:00" class="mono" />
          <input id="evTitle" placeholder="タイトル 例 MR面談" />
          <button class="mini" id="evAdd">追加</button>
        </div>
      </div>
    </div>
    <button class="reopen" id="reopen">調整ポータル</button>

    <script>
      /* =========================================================
         1) トークン定義（本番 index.css と 1:1）
         alias = モック描画用 CSS 変数名（複数可）。catId = カテゴリ色。
         ========================================================= */
      const TOKENS = [
        { grp: "面（サーフェス）" },
        { k: "--background", label: "地（背景）", alias: ["--page"] },
        { k: "--card", label: "パネル/カード面", alias: ["--surface", "--card"] },
        { k: "--secondary", label: "くぼみ面", alias: ["--sunk"] },
        { grp: "文字" },
        { k: "--foreground", label: "既定の文字", alias: ["--ink"] },
        { k: "--muted-foreground", label: "副文字", alias: ["--ink2"] },
        { k: "--ink-3", label: "補助文字（淡）", alias: ["--ink3"] },
        { grp: "線" },
        { k: "--border", label: "標準の線", alias: ["--hair"] },
        { k: "--input", label: "強い線・入力枠", alias: ["--hair2"] },
        { grp: "アクセント（テラコッタ）" },
        { k: "--primary", label: "アクセント（主）", alias: ["--accent"] },
        { k: "--accent", label: "アクセント淡色", alias: ["--accent-soft"] },
        { grp: "締切の緊急度" },
        { k: "--crit", label: "緊急・赤（3日以内）", alias: ["--crit"] },
        { k: "--crit-soft", label: "緊急 淡色", alias: ["--crit-soft"] },
        { k: "--warn", label: "注意・橙（7日以内）", alias: ["--warn"] },
        { k: "--warn-soft", label: "注意 淡色", alias: ["--warn-soft"] },
        { grp: "カテゴリ標準色" },
        { k: "--cat-jimu", label: "事務", catId: "jimu" },
        { k: "--cat-keiei", label: "経営", catId: "keiei" },
        { k: "--cat-saiyo", label: "採用", catId: "saiyo" },
        { k: "--cat-mibun", label: "未分類", catId: "mibun" },
      ];
      const TOKEN_KEYS = TOKENS.filter((t) => t.k).map((t) => t.k);

      /* 2) プリセット（本番トークン名で定義） */
      const CAT_BASE = {
        "--cat-jimu": "#6b7c93",
        "--cat-keiei": "#8a6d3b",
        "--cat-saiyo": "#7a5c8e",
        "--cat-mibun": "#9aa29f",
      };
      const PRESETS = {
        cur: {
          "--background": "#f3eee3",
          "--card": "#fbf8f1",
          "--secondary": "#efe9db",
          "--foreground": "#33302a",
          "--muted-foreground": "#6f685c",
          "--ink-3": "#a39a89",
          "--border": "#e3dccb",
          "--input": "#d6cdb8",
          "--primary": "#b2542f",
          "--accent": "#f3e3d8",
          "--crit": "#a8341f",
          "--crit-soft": "#f4ddd4",
          "--warn": "#98701f",
          "--warn-soft": "#f1e7cf",
          ...CAT_BASE,
          "--radius": 8,
        },
        p1: {
          "--background": "#f1e9d7",
          "--card": "#fdfaf2",
          "--secondary": "#ece3d0",
          "--foreground": "#2a2620",
          "--muted-foreground": "#585044",
          "--ink-3": "#8a8070",
          "--border": "#d8cdb6",
          "--input": "#c4b89c",
          "--primary": "#a8482a",
          "--accent": "#f1ddcd",
          "--crit": "#9e2f1b",
          "--crit-soft": "#f3d6cb",
          "--warn": "#8a6516",
          "--warn-soft": "#efe3c6",
          ...CAT_BASE,
          "--radius": 8,
        },
        p2: {
          "--background": "#f5f1e8",
          "--card": "#ffffff",
          "--secondary": "#efeadf",
          "--foreground": "#282520",
          "--muted-foreground": "#5b554b",
          "--ink-3": "#8f8576",
          "--border": "#e4dccc",
          "--input": "#d2c8b4",
          "--primary": "#b04a2c",
          "--accent": "#f4e2d6",
          "--crit": "#a33420",
          "--crit-soft": "#f6dcd1",
          "--warn": "#936a1a",
          "--warn-soft": "#f2e7cd",
          ...CAT_BASE,
          "--radius": 8,
        },
        p3: {
          "--background": "#efe6d4",
          "--card": "#fbf7ee",
          "--secondary": "#e7ddc8",
          "--foreground": "#221f1a",
          "--muted-foreground": "#544d3e",
          "--ink-3": "#847a68",
          "--border": "#d3c7ad",
          "--input": "#beb095",
          "--primary": "#bd4f2b",
          "--accent": "#f5ddd0",
          "--crit": "#a82f1a",
          "--crit-soft": "#f5d7cb",
          "--warn": "#8f6614",
          "--warn-soft": "#f0e2c4",
          ...CAT_BASE,
          "--radius": 8,
        },
      };
      const FONTS = {
        std: {
          "--font-body": '"Noto Sans JP", sans-serif',
          "--font-head": '"Shippori Mincho", serif',
        },
        crisp: {
          "--font-body": '"IBM Plex Sans JP", "Noto Sans JP", sans-serif',
          "--font-head": '"Zen Old Mincho", "Yu Mincho", serif',
        },
      };

      const LS_KEY = "ichimoku-tuner-v1";
      const root = document.documentElement;
      let state = {};
      let fontKey = "std";

      function normHex(v) {
        if (!v) return null;
        v = v.trim().toLowerCase();
        if (v[0] !== "#") v = "#" + v;
        if (/^#[0-9a-f]{3}$/.test(v)) v = "#" + v.slice(1).replace(/./g, (c) => c + c);
        return /^#[0-9a-f]{6}$/.test(v) ? v : null;
      }

      /* 1 トークン適用（DOM 反映のみ。再描画は呼び出し側で集約） */
      function applyToken(def, val) {
        state[def.k] = val;
        root.style.setProperty(def.k, val);
        (def.alias || []).forEach((a) => root.style.setProperty(a, val));
        if (def.catId) {
          const c = CATS.find((x) => x.id === def.catId);
          if (c) c.color = val;
        }
      }

      function applyRadius(px) {
        state["--radius"] = px;
        root.style.setProperty("--radius", px + "px");
        root.style.setProperty("--r", px + "px");
        root.style.setProperty("--r2", Math.max(0, px - 2) + "px");
        const el = document.getElementById("radiusVal");
        if (el) el.textContent = px + "px";
        const rg = document.getElementById("radius");
        if (rg) rg.value = px;
      }

      function applyFont(key) {
        fontKey = key;
        for (const [k, v] of Object.entries(FONTS[key])) root.style.setProperty(k, v);
        document
          .querySelectorAll("[data-font]")
          .forEach((b) => b.classList.toggle("on", b.dataset.font === key));
      }

      /* state 全体を DOM・入力欄へ反映し、必要なら再描画 */
      function applyState(render) {
        TOKENS.filter((t) => t.k).forEach((def) => {
          const val = state[def.k];
          applyToken(def, val);
          const ci = document.querySelector(`input[type=color][data-k="${def.k}"]`);
          const hi = document.querySelector(`input.thex[data-k="${def.k}"]`);
          if (ci) ci.value = val;
          if (hi) hi.value = val;
        });
        applyRadius(state["--radius"] ?? 8);
        if (render) {
          renderBoard();
          renderRail();
        }
        updateExport();
        saveLS();
      }

      function loadPreset(key) {
        state = { ...PRESETS[key] };
        applyState(true);
      }

      function saveLS() {
        try {
          localStorage.setItem(LS_KEY, JSON.stringify({ state, fontKey }));
        } catch (e) {}
      }
      function loadLS() {
        try {
          const raw = localStorage.getItem(LS_KEY);
          if (!raw) return false;
          const o = JSON.parse(raw);
          if (!o || !o.state) return false;
          state = { ...PRESETS.cur, ...o.state };
          fontKey = o.fontKey || "std";
          return true;
        } catch (e) {
          return false;
        }
      }

      /* 3) index.css :root ブロック生成（リンク派生も展開） */
      function updateExport() {
        const g = (k) => state[k];
        const block = `:root {
  --radius: ${(state["--radius"] ?? 8) / 16}rem; /* ${state["--radius"] ?? 8}px */

  /* 面（紙の質感） */
  --background: ${g("--background")};
  --foreground: ${g("--foreground")};
  --card: ${g("--card")};
  --card-foreground: ${g("--foreground")};
  --popover: ${g("--card")};
  --popover-foreground: ${g("--foreground")};

  /* アクセント（テラコッタ） */
  --primary: ${g("--primary")};
  --primary-foreground: #ffffff;
  --accent: ${g("--accent")};
  --accent-foreground: ${g("--primary")};

  /* 副次面 */
  --secondary: ${g("--secondary")};
  --secondary-foreground: ${g("--foreground")};
  --muted: ${g("--secondary")};
  --muted-foreground: ${g("--muted-foreground")};

  /* 破壊的/緊急 */
  --destructive: ${g("--crit")};
  --destructive-foreground: #ffffff;

  /* 線 */
  --border: ${g("--border")};
  --input: ${g("--input")};
  --ring: ${g("--primary")};

  /* ドメイン拡張トークン */
  --ink-3: ${g("--ink-3")};
  --crit: ${g("--crit")};
  --crit-soft: ${g("--crit-soft")};
  --warn: ${g("--warn")};
  --warn-soft: ${g("--warn-soft")};
  --cat-jimu: ${g("--cat-jimu")};
  --cat-keiei: ${g("--cat-keiei")};
  --cat-saiyo: ${g("--cat-saiyo")};
  --cat-mibun: ${g("--cat-mibun")};
}`;
        document.getElementById("exportArea").value = block;
      }

      /* 4) ポータル UI 生成 */
      function buildRows() {
        const host = document.getElementById("tokenRows");
        host.innerHTML = TOKENS.map((t) => {
          if (t.grp) return `<div class="tgrp">${t.grp}</div>`;
          return `<div class="trow" data-row="${t.k}">
            <span class="tlab">${t.label}</span>
            <input type="color" data-k="${t.k}" />
            <input class="thex mono" type="text" data-k="${t.k}" maxlength="7" />
          </div>`;
        }).join("");

        host.querySelectorAll('input[type="color"]').forEach((ci) => {
          ci.oninput = () => {
            const def = TOKENS.find((t) => t.k === ci.dataset.k);
            const val = ci.value.toLowerCase();
            applyToken(def, val);
            const hi = host.querySelector(`input.thex[data-k="${ci.dataset.k}"]`);
            if (hi) hi.value = val;
            hi.parentElement.classList.remove("invalid");
            renderBoard();
            renderRail();
            updateExport();
            saveLS();
          };
        });
        host.querySelectorAll("input.thex").forEach((hi) => {
          hi.oninput = () => {
            const norm = normHex(hi.value);
            const row = hi.parentElement;
            if (!norm) {
              row.classList.add("invalid");
              return;
            }
            row.classList.remove("invalid");
            const def = TOKENS.find((t) => t.k === hi.dataset.k);
            applyToken(def, norm);
            const ci = host.querySelector(`input[type=color][data-k="${hi.dataset.k}"]`);
            if (ci) ci.value = norm;
            renderBoard();
            renderRail();
            updateExport();
            saveLS();
          };
        });
      }

      /* =========================================================
         共通エンジン（B-warm.html と同一のデータ・機能）
         ========================================================= */
      const TODAY = new Date("2026-06-16T00:00:00");
      const CATS = [
        { id: "mibun", name: "未分類", color: "#9aa29f" },
        { id: "jimu", name: "事務", color: "#6b7c93" },
        { id: "keiei", name: "経営", color: "#8a6d3b" },
        { id: "saiyo", name: "採用", color: "#7a5c8e" },
      ];
      const STATUS = [
        ["todo", "未着手"],
        ["doing", "対応中"],
        ["done", "完了"],
      ];
      let seq = 100;
      let tasks = [
        {
          id: 1,
          title: "レセプト点検（5月分）",
          cat: "jimu",
          status: "todo",
          due: null,
          memo: "",
          links: [],
        },
        {
          id: 2,
          title: "社会保険料の納付",
          cat: "jimu",
          status: "todo",
          due: "2026-06-20",
          memo: "口座振替の残高確認",
          links: [{ title: "年金事務所", url: "https://example.com" }],
        },
        {
          id: 3,
          title: "請求書の発行（5件）",
          cat: "jimu",
          status: "doing",
          due: null,
          memo: "",
          links: [],
        },
        {
          id: 4,
          title: "経費精算の締め",
          cat: "jimu",
          status: "done",
          due: null,
          memo: "",
          links: [],
        },
        {
          id: 5,
          title: "決算準備（資料一式）",
          cat: "keiei",
          status: "todo",
          due: "2026-06-30",
          memo: "",
          links: [],
        },
        {
          id: 6,
          title: "月次レポート提出",
          cat: "keiei",
          status: "doing",
          due: "2026-06-25",
          memo: "",
          links: [],
        },
        {
          id: 7,
          title: "銀行面談の資料づくり",
          cat: "keiei",
          status: "doing",
          due: null,
          memo: "",
          links: [],
        },
        {
          id: 8,
          title: "薬剤師 面接の日程調整",
          cat: "saiyo",
          status: "doing",
          due: null,
          memo: "",
          links: [],
        },
        {
          id: 9,
          title: "求人票の更新",
          cat: "saiyo",
          status: "todo",
          due: null,
          memo: "",
          links: [],
        },
      ];
      let events = [
        { id: 1, time: "14:00", title: "MR面談（恵比寿）" },
        { id: 2, time: "16:00", title: "商工会 講演" },
      ];
      const collapsed = {};

      const $ = (s) => document.querySelector(s);
      function dueInfo(due) {
        if (!due) return null;
        const d = new Date(due + "T00:00:00");
        const days = Math.round((d - TODAY) / 86400000);
        let cls = "";
        if (days <= 3) cls = "crit";
        else if (days <= 7) cls = "warn";
        return { days, cls, md: d.getMonth() + 1 + "/" + d.getDate() };
      }
      function esc(s) {
        return (s || "").replace(
          /[&<>"]/g,
          (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c]
        );
      }

      function renderRail() {
        const items = tasks
          .filter((t) => t.due && t.status !== "done")
          .sort((a, b) => (a.due < b.due ? -1 : 1));
        const el = $("#rail");
        if (!items.length) {
          el.innerHTML = '<div class="rail-empty">締切のあるタスクはまだありません</div>';
          return;
        }
        el.innerHTML = items
          .map((t) => {
            const di = dueInfo(t.due);
            const left = di.days < 0 ? "期限切れ" : "あと " + di.days + "日";
            return `<div class="dchip ${di.cls}" data-id="${t.id}">
            <div class="t">${esc(t.title)}</div>
            <div class="m"><span class="dt">${di.md}</span><span class="lf mono">${left}</span></div></div>`;
          })
          .join("");
        el.querySelectorAll(".dchip").forEach((c) => (c.onclick = () => openPeek(+c.dataset.id)));
      }

      function renderBoard() {
        const board = $("#board");
        board.innerHTML = CATS.map((cat) => {
          const inCat = tasks.filter((t) => t.cat === cat.id);
          const isCol = collapsed[cat.id];
          const cells = STATUS.map(([sk]) => {
            const cards =
              inCat
                .filter((t) => t.status === sk)
                .map((t) => {
                  const di = dueInfo(t.due);
                  const chip = di
                    ? `<div class="meta"><span class="due ${di.cls}">締切 <span class="mono">${di.md}</span></span></div>`
                    : "";
                  return `<div class="card ${sk === "done" ? "donecard" : ""}" style="border-left-color:${cat.color}" data-id="${t.id}"><span class="ct">${esc(t.title)}</span>${chip}</div>`;
                })
                .join("") || '<div class="cell-empty">—</div>';
            return `<div class="cell">${cards}</div>`;
          }).join("");
          return `<div class="lane ${isCol ? "col" : ""}" data-cat="${cat.id}">
            <div class="lane-h"><span class="dot" style="background:${cat.color}"></span>
              <span class="nm">${cat.name}</span><span class="ct">${inCat.length}</span><span class="cv">▾</span></div>
            <div class="cells">${cells}</div></div>`;
        }).join("");
        board.querySelectorAll(".lane-h").forEach(
          (h) =>
            (h.onclick = () => {
              const cid = h.parentElement.dataset.cat;
              collapsed[cid] = !collapsed[cid];
              renderBoard();
            })
        );
        board.querySelectorAll(".card").forEach(
          (c) =>
            (c.onclick = (e) => {
              e.stopPropagation();
              openPeek(+c.dataset.id);
            })
        );
      }

      function renderAgenda() {
        const days = [
          { n: 16, w: "月・今日", today: true, evs: events },
          { n: 17, w: "火", evs: [{ time: "10:00", title: "店舗ミーティング" }] },
          { n: 18, w: "水", evs: [] },
          { n: 19, w: "木", evs: [{ time: "15:00", title: "税理士 打ち合わせ" }] },
        ];
        $("#agenda").innerHTML = days
          .map((d) => {
            const evs = d.evs.length
              ? d.evs
                  .map(
                    (e) =>
                      `<div class="ev ${d.today ? "acc" : ""}"><span class="tm mono">${esc(e.time)}</span><span class="tl">${esc(e.title)}</span></div>`
                  )
                  .join("")
              : '<div class="empty">予定なし</div>';
            return `<div class="day ${d.today ? "today" : ""}"><div><div class="dnum">${d.n}</div><div class="dwk">${d.w}</div></div><div class="evs">${evs}</div></div>`;
          })
          .join("");
      }

      function flashSaved() {
        const s = $("#peekSaved");
        if (!s) return;
        s.classList.add("show");
        clearTimeout(s._t);
        s._t = setTimeout(() => s.classList.remove("show"), 900);
      }
      function openPeek(id) {
        const t = tasks.find((x) => x.id === id);
        if (!t) return;
        const catOpts = CATS.map(
          (c) => `<option value="${c.id}" ${c.id === t.cat ? "selected" : ""}>${c.name}</option>`
        ).join("");
        const stOpts = STATUS.map(
          ([k, l]) => `<option value="${k}" ${k === t.status ? "selected" : ""}>${l}</option>`
        ).join("");
        const links = t.links
          .map(
            (l, i) =>
              `<div class="lnk"><input data-li="${i}" data-k="title" value="${esc(l.title)}" placeholder="ラベル（任意）"/><input data-li="${i}" data-k="url" value="${esc(l.url)}" placeholder="https://…" style="color:var(--accent)"/></div>`
          )
          .join("");
        $("#peekIn").innerHTML = `
          <div class="peek-top"><span class="lab">タスク詳細</span>
            <span class="saved" id="peekSaved">保存済み ✓</span><button class="x" id="peekX">×</button></div>
          <input class="f-title" id="fTitle" value="${esc(t.title)}"/>
          <div class="fld"><label>メモ</label><textarea class="f" id="fMemo" placeholder="補足や手順">${esc(t.memo)}</textarea></div>
          <div class="fld"><label>リンク</label><div id="fLinks">${links}</div><button class="addlnk" id="addLnk">＋ リンクを追加</button></div>
          <div class="fld"><label class="chk"><input type="checkbox" id="fDueChk" ${t.due ? "checked" : ""}/> 締切を設定</label>
            <div id="fDueWrap" style="margin-top:8px;${t.due ? "" : "display:none"}"><input type="date" id="fDue" value="${t.due || ""}"/></div></div>
          <div class="row2"><div class="fld"><label>カテゴリ</label><select id="fCat">${catOpts}</select></div>
            <div class="fld"><label>状態</label><select id="fStatus">${stOpts}</select></div></div>
          <div class="peek-foot"><span class="meta">作成 6/14 ・ 更新 6/15</span><button class="danger" id="fDel">削除</button></div>`;

        $("#fTitle").oninput = (e) => {
          t.title = e.target.value;
          renderBoard();
          renderRail();
          flashSaved();
        };
        $("#fMemo").oninput = (e) => {
          t.memo = e.target.value;
          flashSaved();
        };
        $("#fCat").onchange = (e) => {
          t.cat = e.target.value;
          renderBoard();
          flashSaved();
        };
        $("#fStatus").onchange = (e) => {
          t.status = e.target.value;
          renderBoard();
          renderRail();
          flashSaved();
        };
        $("#fDueChk").onchange = (e) => {
          const w = $("#fDueWrap");
          if (e.target.checked) {
            w.style.display = "";
          } else {
            w.style.display = "none";
            t.due = null;
            renderBoard();
            renderRail();
            flashSaved();
          }
        };
        $("#fDue").onchange = (e) => {
          t.due = e.target.value || null;
          renderBoard();
          renderRail();
          flashSaved();
        };
        $("#addLnk").onclick = () => {
          t.links.push({ title: "", url: "" });
          openPeek(id);
        };
        $("#peekIn")
          .querySelectorAll("#fLinks input")
          .forEach(
            (inp) =>
              (inp.oninput = (e) => {
                const i = +e.target.dataset.li,
                  k = e.target.dataset.k;
                t.links[i][k] = e.target.value;
                flashSaved();
              })
          );
        $("#fDel").onclick = () => {
          tasks = tasks.filter((x) => x.id !== id);
          closePeek();
          renderBoard();
          renderRail();
        };
        $("#peekX").onclick = closePeek;
        $("#peek").classList.add("on");
        $("#backdrop").classList.add("on");
      }

      function openCats() {
        const rows = CATS.map((c) => {
          const cnt = tasks.filter((t) => t.cat === c.id).length;
          return `<div class="catrow"><span class="dot" style="background:${c.color}"></span><span class="nm">${c.name}</span><span class="cnt">${cnt} 件</span></div>`;
        }).join("");
        $("#peekIn").innerHTML = `
          <div class="peek-top"><span class="lab">カテゴリ管理</span><button class="x" id="peekX">×</button></div>
          <div>${rows}</div>
          <button class="addlnk" id="addCat">＋ カテゴリを追加</button>`;
        $("#peekX").onclick = closePeek;
        $("#addCat").onclick = () => {
          alert("（デモ）カテゴリ追加 — 本実装で CRUD を提供");
        };
        $("#peek").classList.add("on");
        $("#backdrop").classList.add("on");
      }

      function closePeek() {
        $("#peek").classList.remove("on");
        $("#backdrop").classList.remove("on");
      }

      $("#qadd").addEventListener("keydown", (e) => {
        if (e.key === "Enter" && e.target.value.trim()) {
          tasks.unshift({
            id: ++seq,
            title: e.target.value.trim(),
            cat: "mibun",
            status: "todo",
            due: null,
            memo: "",
            links: [],
          });
          e.target.value = "";
          collapsed["mibun"] = false;
          renderBoard();
        }
      });

      const evPop = $("#evPop");
      $("#addEvBtn").onclick = (e) => {
        e.stopPropagation();
        const b = $("#addEvBtn").getBoundingClientRect(),
          a = $("#app").getBoundingClientRect();
        evPop.style.top = b.bottom - a.top + 8 + "px";
        evPop.style.left = Math.max(8, b.right - a.left - 256) + "px";
        evPop.classList.add("on");
        $("#evTime").focus();
      };
      $("#evAdd").onclick = () => {
        const tm = $("#evTime").value.trim(),
          tl = $("#evTitle").value.trim();
        if (tm && tl) {
          events.push({ time: tm, title: tl });
          events.sort((a, b) => (a.time < b.time ? -1 : 1));
          renderAgenda();
        }
        $("#evTime").value = "";
        $("#evTitle").value = "";
        evPop.classList.remove("on");
      };
      $("#catBtn").onclick = openCats;
      $("#backdrop").onclick = closePeek;
      document.addEventListener("click", (e) => {
        if (
          evPop.classList.contains("on") &&
          !evPop.contains(e.target) &&
          e.target.id !== "addEvBtn"
        )
          evPop.classList.remove("on");
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          closePeek();
          evPop.classList.remove("on");
        }
      });

      /* ===== ポータルのイベント結線 ===== */
      document
        .querySelectorAll("[data-preset]")
        .forEach((b) => (b.onclick = () => loadPreset(b.dataset.preset)));
      document.querySelectorAll("[data-font]").forEach(
        (b) =>
          (b.onclick = () => {
            applyFont(b.dataset.font);
            saveLS();
          })
      );
      document.getElementById("radius").oninput = (e) => {
        applyRadius(+e.target.value);
        saveLS();
      };
      document.getElementById("resetBtn").onclick = () => {
        localStorage.removeItem(LS_KEY);
        loadPreset("cur");
      };
      document.getElementById("copyBtn").onclick = async () => {
        const ta = document.getElementById("exportArea");
        ta.select();
        let ok = false;
        try {
          await navigator.clipboard.writeText(ta.value);
          ok = true;
        } catch (e) {
          try {
            ok = document.execCommand("copy");
          } catch (_) {}
        }
        const btn = document.getElementById("copyBtn");
        const old = btn.textContent;
        btn.textContent = ok ? "コピーしました ✓" : "手動でコピーしてください";
        setTimeout(() => (btn.textContent = old), 1400);
      };
      const collapseBtns = [document.getElementById("collapse"), document.getElementById("reopen")];
      collapseBtns.forEach(
        (b) => (b.onclick = () => document.getElementById("wrap").classList.toggle("collapsed"))
      );

      /* ===== 起動 ===== */
      buildRows();
      if (!loadLS()) state = { ...PRESETS.cur };
      applyState(false);
      applyFont(fontKey);
      renderRail();
      renderBoard();
      renderAgenda();
    </script>
  </body>
</html>
