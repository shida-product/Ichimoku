<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hibi — 操作プロトタイプ（スライドイン / ポップ）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --page:#EEF1F0;--surface:#FFFFFF;--sunk:#F5F7F6;--ink:#1C2826;--ink2:#5C6A66;--ink3:#8C9794;
    --line:#E0E6E3;--line2:#CDD6D2;--accent:#2F6F62;--accent-soft:#E4EFEB;
    --crit:#C2410C;--crit-soft:#FBEAE1;--warn:#B45309;--warn-soft:#F7EEDD;
    --jimu:#6B7C93;--keiei:#8A6D3B;--saiyo:#7A5C8E;--mibun:#9AA29F;
    --r:11px;--r2:8px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:"Noto Sans JP",sans-serif;background:var(--page);color:var(--ink);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;}
  .mono{font-family:"Roboto Mono",monospace;font-variant-numeric:tabular-nums;}
  .app{position:relative;height:100vh;overflow:hidden;display:flex;flex-direction:column;max-width:1320px;margin:0 auto;}
  .scroll{flex:1;overflow:auto;padding:16px 22px 40px;}

  .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 22px 8px;}
  .brand{display:flex;align-items:baseline;gap:10px;}
  .brand h1{font-size:21px;font-weight:700;letter-spacing:.02em;margin:0;}
  .brand .tag{font-size:12px;color:var(--ink3);}
  .quick{display:flex;align-items:center;gap:8px;flex:1;max-width:440px;background:var(--surface);border:1px solid var(--line2);border-radius:var(--r2);padding:0 10px;}
  .quick input{border:none;outline:none;background:transparent;flex:1;font-family:inherit;font-size:13px;padding:9px 2px;}
  .quick .hint{font-size:11px;color:var(--ink3);white-space:nowrap;}
  .btn{font-family:inherit;font-size:13px;border:1px solid var(--line2);background:var(--surface);color:var(--ink);border-radius:var(--r2);padding:8px 13px;cursor:pointer;}
  .btn:hover{background:var(--sunk);}

  .rail{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:11px 13px;margin-bottom:16px;}
  .rail-h{display:flex;gap:10px;align-items:center;margin:0 2px 9px;}
  .rail-h .l{font-size:12px;font-weight:500;letter-spacing:.04em;color:var(--ink2);}
  .rail-h .h{font-size:11px;color:var(--ink3);}
  .rail-row{display:flex;gap:9px;overflow-x:auto;padding-bottom:2px;min-height:30px;}
  .dchip{flex:0 0 auto;min-width:172px;background:var(--sunk);border:1px solid var(--line);border-radius:var(--r2);padding:9px 11px 9px 14px;position:relative;cursor:pointer;}
  .dchip:hover{border-color:var(--line2);}
  .dchip::before{content:"";position:absolute;left:0;top:9px;bottom:9px;width:3px;border-radius:3px;background:var(--ink3);}
  .dchip.crit::before{background:var(--crit);}.dchip.warn::before{background:var(--warn);}
  .dchip .t{font-size:13px;font-weight:500;}
  .dchip .m{display:flex;justify-content:space-between;margin-top:5px;}
  .dchip .dt{font-size:11px;color:var(--ink3);}
  .dchip .lf{font-size:12px;font-weight:500;color:var(--ink2);}
  .dchip.crit .lf{color:var(--crit);}.dchip.warn .lf{color:var(--warn);}
  .rail-empty{font-size:12px;color:var(--ink3);padding:4px;}

  .ws{display:grid;grid-template-columns:1.7fr 1fr;gap:16px;align-items:start;}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);}
  .ph{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;border-bottom:1px solid var(--line);}
  .ph .tt{font-size:14px;font-weight:700;}
  .ph .sub{font-size:11px;color:var(--ink3);}

  .shead{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;padding:11px 15px 0;}
  .shead span{font-size:11px;font-weight:500;letter-spacing:.05em;color:var(--ink2);}
  .shead .d{color:var(--ink3);}
  .lane{padding:7px 15px 3px;border-bottom:1px dashed var(--line);}
  .lane:last-child{border-bottom:none;}
  .lane-h{display:flex;align-items:center;gap:8px;padding:6px 2px;cursor:pointer;user-select:none;}
  .dot{width:9px;height:9px;border-radius:3px;}
  .lane-h .nm{font-size:13px;font-weight:500;}
  .lane-h .ct{font-size:11px;color:var(--ink3);}
  .lane-h .cv{margin-left:auto;color:var(--ink3);font-size:10px;transition:transform .15s;}
  .lane.col .cv{transform:rotate(-90deg);}
  .lane.col .cells{display:none;}
  .cells{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;padding-bottom:6px;}
  .cell{min-height:30px;display:flex;flex-direction:column;gap:7px;border-radius:var(--r2);}
  .cell.donec{background:var(--sunk);padding:6px;}
  .card{background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--ink3);border-radius:var(--r2);padding:8px 10px;display:flex;flex-direction:column;gap:6px;cursor:pointer;transition:border-color .12s,box-shadow .12s;}
  .card:hover{border-color:var(--line2);box-shadow:0 1px 0 rgba(0,0,0,.02);}
  .card .ct{font-size:13px;line-height:1.4;}
  .card .meta{display:flex;gap:6px;flex-wrap:wrap;}
  .due{font-size:11px;display:inline-flex;align-items:center;gap:4px;color:var(--ink2);background:var(--sunk);border:1px solid var(--line);padding:2px 7px;border-radius:20px;}
  .due.crit{color:var(--crit);background:var(--crit-soft);border-color:#F2D3C5;}
  .due.warn{color:var(--warn);background:var(--warn-soft);border-color:#EBDCBE;}
  .donecard{opacity:.55;}.donecard .ct{text-decoration:line-through;color:var(--ink2);}

  .cal-h{display:flex;align-items:center;gap:8px;}
  .agenda{padding:6px 10px 12px;}
  .day{display:grid;grid-template-columns:54px 1fr;gap:10px;padding:9px 6px;border-radius:var(--r2);}
  .day+.day{border-top:1px solid var(--line);}
  .day.today{background:var(--accent-soft);}
  .dnum{font-size:17px;font-weight:700;}.dwk{font-size:11px;color:var(--ink3);}
  .day.today .dnum{color:var(--accent);}.day.today .dwk{color:var(--accent);}
  .evs{display:flex;flex-direction:column;gap:6px;padding-top:2px;}
  .ev{display:flex;gap:9px;align-items:center;background:var(--sunk);border:1px solid var(--line);border-radius:6px;padding:5px 9px;}
  .ev.acc{background:#fff;border-left:3px solid var(--accent);}
  .ev .tm{font-size:11px;color:var(--ink2);min-width:40px;}
  .ev .tl{font-size:12.5px;}
  .empty{font-size:11px;color:var(--ink3);}

  /* overlays */
  .backdrop{position:absolute;inset:0;background:rgba(20,30,28,.18);opacity:0;pointer-events:none;transition:opacity .18s;z-index:20;}
  .backdrop.on{opacity:1;pointer-events:auto;}
  .peek{position:absolute;top:0;right:0;bottom:0;width:380px;background:var(--surface);border-left:1px solid var(--line2);box-shadow:-8px 0 24px rgba(20,30,28,.06);transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.2,1);z-index:30;display:flex;flex-direction:column;}
  .peek.on{transform:translateX(0);}
  .peek-in{padding:18px;display:flex;flex-direction:column;gap:15px;overflow:auto;}
  .peek-top{display:flex;align-items:center;justify-content:space-between;}
  .peek-top .lab{font-size:11px;letter-spacing:.04em;color:var(--ink3);}
  .peek-top .saved{font-size:11px;color:var(--accent);opacity:0;transition:opacity .2s;}
  .peek-top .saved.show{opacity:1;}
  .x{cursor:pointer;color:var(--ink3);font-size:18px;line-height:1;border:none;background:none;}
  .f-title{font-size:16px;font-weight:500;border:none;border-bottom:1px solid var(--line);border-radius:0;padding:5px 0;outline:none;font-family:inherit;}
  .fld label{font-size:12px;color:var(--ink2);display:block;margin-bottom:6px;}
  textarea,select,input[type=date],.lnk input{font-family:inherit;font-size:13px;border:1px solid var(--line2);border-radius:6px;padding:8px;outline:none;width:100%;background:var(--surface);}
  textarea{resize:vertical;min-height:62px;}
  .row2{display:flex;gap:12px;}.row2 .fld{flex:1;}
  .chk{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;user-select:none;}
  .chk input{width:15px;height:15px;accent-color:var(--accent);}
  .lnk{display:flex;gap:6px;margin-bottom:6px;}
  .addlnk{font-size:12px;color:var(--ink2);background:none;border:none;cursor:pointer;padding:4px 0;}
  .peek-foot{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--line);padding-top:12px;margin-top:2px;}
  .peek-foot .meta{font-size:11px;color:var(--ink3);}
  .danger{color:var(--crit);background:none;border:none;cursor:pointer;font-size:13px;}

  .pop{position:absolute;background:var(--surface);border:1px solid var(--line2);border-radius:var(--r2);box-shadow:0 8px 24px rgba(20,30,28,.12);padding:12px;z-index:40;width:240px;display:none;}
  .pop.on{display:block;}
  .pop .pt{font-size:12px;color:var(--ink2);margin-bottom:8px;}
  .pop input{margin-bottom:8px;}
  .pop .btn{width:100%;background:var(--accent);border-color:var(--accent);color:#fff;}

  .hintbar{font-size:11px;color:var(--ink3);padding:10px 2px 0;text-align:center;}
  @media (max-width:900px){.ws{grid-template-columns:1fr;}.peek{width:100%;}}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
</head>
<body>
<div class="app" id="app">

  <div class="topbar">
    <div class="brand"><h1>Hibi</h1><span class="tag">スライドイン / ポップで完結</span></div>
    <div class="quick">
      <input id="qadd" placeholder="タスクをパッと追加（Enter）— 未分類に入ります" />
      <span class="hint">未分類へ</span>
    </div>
    <button class="btn" id="addEvBtn">＋ 予定</button>
  </div>

  <div class="scroll">
    <section class="rail">
      <div class="rail-h"><span class="l">近日締切</span><span class="h">締切順・常に表示・クリックで詳細</span></div>
      <div class="rail-row" id="rail"></div>
    </section>

    <div class="ws">
      <section class="panel">
        <div class="ph"><span class="tt">タスクボード</span><span class="sub">縦＝カテゴリ ／ 横＝状態</span></div>
        <div class="shead"><span>未着手</span><span>対応中</span><span class="d">完了</span></div>
        <div id="board"></div>
      </section>

      <section class="panel">
        <div class="ph"><span class="tt">カレンダー</span><span class="sub">6月 第3週</span></div>
        <div class="agenda" id="agenda"></div>
      </section>
    </div>

    <div class="hintbar">カードをクリック→右からスライドイン ／ ＋予定→ポップ ／ 締切セットで上のレーンに反映</div>
  </div>

  <!-- overlays -->
  <div class="backdrop" id="backdrop"></div>

  <aside class="peek" id="peek">
    <div class="peek-in" id="peekIn"></div>
  </aside>

  <div class="pop" id="evPop">
    <div class="pt">予定を追加（今日）</div>
    <input id="evTime" placeholder="時刻 例 14:00" class="mono" />
    <input id="evTitle" placeholder="タイトル 例 MR面談" />
    <button class="btn" id="evAdd">追加</button>
  </div>

</div>

<script>
const TODAY = new Date('2026-06-16T00:00:00');
const CATS = [
  {id:'mibun', name:'未分類', color:'var(--mibun)'},
  {id:'jimu',  name:'事務',  color:'var(--jimu)'},
  {id:'keiei', name:'経営',  color:'var(--keiei)'},
  {id:'saiyo', name:'採用',  color:'var(--saiyo)'},
];
const STATUS = [['todo','未着手'],['doing','対応中'],['done','完了']];
let seq = 100;
let tasks = [
  {id:1, title:'レセプト点検（5月分）', cat:'jimu', status:'todo', due:null, memo:'', links:[]},
  {id:2, title:'社会保険料の納付', cat:'jimu', status:'todo', due:'2026-06-20', memo:'口座振替の残高確認', links:[{title:'年金事務所',url:'https://example.com'}]},
  {id:3, title:'請求書の発行（5件）', cat:'jimu', status:'doing', due:null, memo:'', links:[]},
  {id:4, title:'経費精算の締め', cat:'jimu', status:'done', due:null, memo:'', links:[]},
  {id:5, title:'決算準備（資料一式）', cat:'keiei', status:'todo', due:'2026-06-30', memo:'', links:[]},
  {id:6, title:'月次レポート提出', cat:'keiei', status:'doing', due:'2026-06-25', memo:'', links:[]},
  {id:7, title:'銀行面談の資料づくり', cat:'keiei', status:'doing', due:null, memo:'', links:[]},
  {id:8, title:'薬剤師 面接の日程調整', cat:'saiyo', status:'doing', due:null, memo:'', links:[]},
  {id:9, title:'求人票の更新', cat:'saiyo', status:'todo', due:null, memo:'', links:[]},
];
let events = [
  {id:1, time:'14:00', title:'MR面談（恵比寿）'},
  {id:2, time:'16:00', title:'商工会 講演'},
];
const collapsed = {};

const $ = s => document.querySelector(s);
function dueInfo(due){
  if(!due) return null;
  const d = new Date(due+'T00:00:00');
  const days = Math.round((d-TODAY)/86400000);
  let cls=''; if(days<=3) cls='crit'; else if(days<=7) cls='warn';
  const md = (d.getMonth()+1)+'/'+d.getDate();
  return {days, cls, md};
}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function renderRail(){
  const items = tasks.filter(t=>t.due && t.status!=='done')
    .sort((a,b)=>a.due<b.due?-1:1);
  const el = $('#rail');
  if(!items.length){ el.innerHTML = '<div class="rail-empty">締切のあるタスクはまだありません</div>'; return; }
  el.innerHTML = items.map(t=>{
    const di = dueInfo(t.due);
    const left = di.days<0?'期限切れ':('あと '+di.days+'日');
    return `<div class="dchip ${di.cls}" data-id="${t.id}">
      <div class="t">${esc(t.title)}</div>
      <div class="m"><span class="dt">${di.md}</span><span class="lf mono">${left}</span></div></div>`;
  }).join('');
  el.querySelectorAll('.dchip').forEach(c=>c.onclick=()=>openPeek(+c.dataset.id));
}

function renderBoard(){
  const board = $('#board');
  board.innerHTML = CATS.map(cat=>{
    const inCat = tasks.filter(t=>t.cat===cat.id);
    const isCol = collapsed[cat.id];
    const cells = STATUS.map(([sk])=>{
      const cards = inCat.filter(t=>t.status===sk).map(t=>{
        const di = dueInfo(t.due);
        const chip = di ? `<div class="meta"><span class="due ${di.cls}">締切 <span class="mono">${di.md}</span></span></div>`:'';
        return `<div class="card ${sk==='done'?'donecard':''}" style="border-left-color:${cat.color}" data-id="${t.id}">
          <span class="ct">${esc(t.title)}</span>${chip}</div>`;
      }).join('');
      return `<div class="cell ${sk==='done'?'donec':''}">${cards}</div>`;
    }).join('');
    return `<div class="lane ${isCol?'col':''}" data-cat="${cat.id}">
      <div class="lane-h"><span class="dot" style="background:${cat.color}"></span>
        <span class="nm">${cat.name}</span><span class="ct">${inCat.length}</span><span class="cv">▾</span></div>
      <div class="cells">${cells}</div></div>`;
  }).join('');
  board.querySelectorAll('.lane-h').forEach(h=>h.onclick=()=>{
    const cid=h.parentElement.dataset.cat; collapsed[cid]=!collapsed[cid]; renderBoard();
  });
  board.querySelectorAll('.card').forEach(c=>c.onclick=e=>{e.stopPropagation();openPeek(+c.dataset.id);});
}

function renderAgenda(){
  const days = [
    {n:16,w:'月・今日',today:true,evs:events},
    {n:17,w:'火',evs:[{time:'10:00',title:'店舗ミーティング'}]},
    {n:18,w:'水',evs:[]},
    {n:19,w:'木',evs:[{time:'15:00',title:'税理士 打ち合わせ'}]},
  ];
  $('#agenda').innerHTML = days.map(d=>{
    const evs = d.evs.length ? d.evs.map(e=>`<div class="ev ${d.today?'acc':''}"><span class="tm mono">${esc(e.time)}</span><span class="tl">${esc(e.title)}</span></div>`).join('')
      : '<div class="empty">予定なし</div>';
    return `<div class="day ${d.today?'today':''}"><div><div class="dnum">${d.n}</div><div class="dwk">${d.w}</div></div><div class="evs">${evs}</div></div>`;
  }).join('');
}

/* ---------- side-peek ---------- */
let peekId = null;
function flashSaved(){ const s=$('#peekSaved'); if(!s)return; s.classList.add('show'); clearTimeout(s._t); s._t=setTimeout(()=>s.classList.remove('show'),900); }
function openPeek(id){
  const t = tasks.find(x=>x.id===id); if(!t) return; peekId=id;
  const catOpts = CATS.map(c=>`<option value="${c.id}" ${c.id===t.cat?'selected':''}>${c.name}</option>`).join('');
  const stOpts = STATUS.map(([k,l])=>`<option value="${k}" ${k===t.status?'selected':''}>${l}</option>`).join('');
  const links = t.links.map((l,i)=>`<div class="lnk"><input data-li="${i}" data-k="title" value="${esc(l.title)}" placeholder="ラベル（任意）"/><input data-li="${i}" data-k="url" value="${esc(l.url)}" placeholder="https://…" style="color:var(--accent)"/></div>`).join('');
  $('#peekIn').innerHTML = `
    <div class="peek-top"><span class="lab">タスク詳細</span>
      <div style="display:flex;align-items:center;gap:10px;"><span class="saved" id="peekSaved">保存済み ✓</span><button class="x" id="peekX">×</button></div></div>
    <input class="f-title" id="fTitle" value="${esc(t.title)}"/>
    <div class="fld"><label>メモ</label><textarea id="fMemo" placeholder="補足や手順">${esc(t.memo)}</textarea></div>
    <div class="fld"><label>リンク</label><div id="fLinks">${links}</div><button class="addlnk" id="addLnk">＋ リンクを追加</button></div>
    <div class="fld">
      <label class="chk"><input type="checkbox" id="fDueChk" ${t.due?'checked':''}/> 締切を設定</label>
      <div id="fDueWrap" style="margin-top:8px;${t.due?'':'display:none'}"><input type="date" id="fDue" value="${t.due||''}"/></div>
    </div>
    <div class="row2">
      <div class="fld"><label>カテゴリ</label><select id="fCat">${catOpts}</select></div>
      <div class="fld"><label>状態</label><select id="fStatus">${stOpts}</select></div>
    </div>
    <div class="peek-foot"><span class="meta">作成 6/14 ・ 更新 6/15</span>
      <button class="danger" id="fDel">削除</button></div>`;

  $('#fTitle').oninput = e=>{ t.title=e.target.value; updateCardTitle(id,e.target.value); renderRail(); flashSaved(); };
  $('#fMemo').oninput = e=>{ t.memo=e.target.value; flashSaved(); };
  $('#fCat').onchange = e=>{ t.cat=e.target.value; renderBoard(); flashSaved(); };
  $('#fStatus').onchange = e=>{ t.status=e.target.value; if(e.target.value==='done')t.due=t.due; renderBoard(); renderRail(); flashSaved(); };
  $('#fDueChk').onchange = e=>{ const w=$('#fDueWrap'); if(e.target.checked){ w.style.display=''; } else { w.style.display='none'; t.due=null; renderBoard(); renderRail(); flashSaved(); } };
  $('#fDue').onchange = e=>{ t.due=e.target.value||null; renderBoard(); renderRail(); flashSaved(); };
  $('#addLnk').onclick = ()=>{ t.links.push({title:'',url:''}); openPeek(id); };
  $('#peekIn').querySelectorAll('#fLinks input').forEach(inp=>inp.oninput=e=>{ const i=+e.target.dataset.li,k=e.target.dataset.k; t.links[i][k]=e.target.value; flashSaved(); });
  $('#fDel').onclick = ()=>{ tasks=tasks.filter(x=>x.id!==id); closePeek(); renderBoard(); renderRail(); };
  $('#peekX').onclick = closePeek;

  $('#peek').classList.add('on'); $('#backdrop').classList.add('on');
}
function updateCardTitle(id,val){ const c=document.querySelector(`.card[data-id="${id}"] .ct`); if(c)c.textContent=val; }
function closePeek(){ peekId=null; $('#peek').classList.remove('on'); $('#backdrop').classList.remove('on'); }

/* ---------- quick add ---------- */
$('#qadd').addEventListener('keydown',e=>{
  if(e.key==='Enter' && e.target.value.trim()){
    tasks.unshift({id:++seq,title:e.target.value.trim(),cat:'mibun',status:'todo',due:null,memo:'',links:[]});
    e.target.value=''; collapsed['mibun']=false; renderBoard();
  }
});

/* ---------- event popover ---------- */
const evPop = $('#evPop');
$('#addEvBtn').onclick = e=>{
  e.stopPropagation();
  const b=$('#addEvBtn').getBoundingClientRect(), a=$('#app').getBoundingClientRect();
  evPop.style.top=(b.bottom-a.top+6)+'px'; evPop.style.left=(b.right-a.left-240)+'px';
  evPop.classList.add('on'); $('#evTime').focus();
};
$('#evAdd').onclick = ()=>{
  const tm=$('#evTime').value.trim(), tl=$('#evTitle').value.trim();
  if(tm&&tl){ events.push({time:tm,title:tl}); events.sort((a,b)=>a.time<b.time?-1:1); renderAgenda(); }
  $('#evTime').value='';$('#evTitle').value=''; evPop.classList.remove('on');
};

/* ---------- global dismiss ---------- */
$('#backdrop').onclick = closePeek;
document.addEventListener('click',e=>{ if(evPop.classList.contains('on') && !evPop.contains(e.target) && e.target.id!=='addEvBtn') evPop.classList.remove('on'); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closePeek(); evPop.classList.remove('on'); } });

renderRail(); renderBoard(); renderAgenda();
</script>
</body>
</html>
